<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Meter</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ------------------------------
   Basic Reset
------------------------------ */
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: 'DM Mono', monospace; background:#060608; color:#f0f0f4; display:flex; flex-direction:column; align-items:center; padding:20px; gap:10px; min-height:100vh; }

/* Header */
.header h1 { font-family:'Bebas Neue', sans-serif; font-size:2rem; color:#aaa; text-align:center; letter-spacing:0.2em; }

/* Wage input row */
.wageRow { display:flex; align-items:center; gap:8px; background:#0f0f12; border:1px solid #1e1e26; border-radius:12px; padding:10px 15px; width:100%; max-width:380px; }
.wageRow label { font-size:0.7rem; color:#888; text-transform:uppercase; }
.wageInputWrap { display:flex; align-items:center; margin-left:auto; gap:5px; }
input[type=number] { background:transparent; border:none; outline:none; color:#f0f0f4; font-size:1.1rem; width:70px; text-align:right; }

/* Mode buttons */
.modes { display:flex; gap:6px; width:100%; max-width:380px; margin-top:8px; }
.modeBtn { flex:1; padding:6px 0; border-radius:999px; border:1px solid #1e1e26; background:transparent; color:#888; font-size:0.65rem; cursor:pointer; transition: all 0.15s; }
.modeBtn.active { background:#00ff8818; color:#00e87a; border-color:#00e87a; }

/* Main card */
.mainCard { width:100%; max-width:380px; background:#0f0f12; border-radius:20px; border:1px solid #1e1e26; padding:25px 20px 20px; display:flex; flex-direction:column; align-items:center; position:relative; }
.mainCard::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% -10%, #00e87a0d 0%, transparent 65%); pointer-events:none; }
.totalLabel { font-size:0.65rem; color:#888; text-transform:uppercase; margin-bottom:2px; }
.totalValue { font-family:'Bebas Neue', sans-serif; font-size:clamp(4rem, 18vw, 6rem); color:#00e87a; text-shadow:0 0 50px #00e87a44; letter-spacing:0.01em; }
.divider { width:35px; height:1px; background:#1e1e26; margin:8px 0 6px; }
.rateLabel { font-size:0.63rem; color:#888; text-transform:uppercase; }
.rateValue { font-family:'Bebas Neue', sans-serif; font-size:1.8rem; color:#ffc840; opacity:0.9; }

/* Progress */
.progressWrap { width:100%; max-width:380px; height:3px; background:#1e1e26; border-radius:99px; overflow:hidden; margin-top:10px; }
.progressFill { height:100%; width:0%; background:linear-gradient(90deg,#00e87a,#00ffaa); border-radius:99px; box-shadow:0 0 6px #00e87a; }

/* Stats */
.statsRow { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; width:100%; max-width:380px; margin-top:10px; }
.stat { background:#0f0f12; border:1px solid #1e1e26; border-radius:10px; padding:10px 6px; text-align:center; }
.sLbl { font-size:0.58rem; color:#888; text-transform:uppercase; margin-bottom:3px; }
.sVal { font-family:'Bebas Neue', sans-serif; font-size:1.05rem; color:#f0f0f4; }

/* Buttons */
.btnRow { display:flex; gap:8px; width:100%; max-width:380px; margin-top:10px; }
.btn { flex:1; padding:12px 0; border:none; border-radius:12px; font-family:'Bebas Neue', sans-serif; font-size:1.15rem; letter-spacing:0.1em; cursor:pointer; transition:0.1s; }
.btnStart { background:#00e87a; color:#000; flex:2; }
.btnStart.paused { background:#00ff8818; color:#00e87a; border:1px solid #00e87a; }
.btnReset { background:#13131a; color:#888; border:1px solid #1e1e26; }
.btnReset:hover { color:#ff4040; border-color:#ff404044; }

/* Status */
.statusRow { display:flex; align-items:center; gap:6px; margin-top:8px; }
.dot { width:7px; height:7px; border-radius:50%; background:#888; transition:0.3s; }
.dot.live { background:#00e87a; box-shadow:0 0 8px #00e87a; animation: blink 1.2s infinite; }
@keyframes blink {0%,100%{opacity:1}50%{opacity:0.25}}
.statusTxt { font-size:0.63rem; color:#888; text-transform:uppercase; }

/* Fun easter egg */
.footerNote { margin-top:12px; font-size:0.65rem; color:#555; text-align:center; }
</style>
</head>
<body>

<div class="header"><h1>Salary Meter</h1></div>

<div class="wageRow">
  <label>Hourly Wage</label>
  <div class="wageInputWrap">
    <span class="sym">€</span>
    <input type="number" id="wage" value="7" min="0.01" step="0.01">
    <span class="unit">/ hour</span>
  </div>
</div>

<div class="modes">
  <button class="modeBtn" data-mode="ms">Millisec.</button>
  <button class="modeBtn active" data-mode="s">Second</button>
  <button class="modeBtn" data-mode="m">Minute</button>
</div>

<div class="mainCard">
  <div class="totalLabel">Total earned</div>
  <div class="totalValue" id="totalValue">€0.0000</div>
  <div class="divider"></div>
  <div class="rateLabel" id="rateLabel">per second</div>
  <div class="rateValue" id="rateValue">€0.000000</div>
</div>

<div class="progressWrap"><div class="progressFill" id="progressFill"></div></div>

<div class="statsRow">
  <div class="stat"><div class="sLbl">Per minute</div><div class="sVal" id="perMin">€0.00</div></div>
  <div class="stat"><div class="sLbl">Per hour</div><div class="sVal" id="perHour">€0.00</div></div>
  <div class="stat"><div class="sLbl">Elapsed time</div><div class="sVal" id="elapsed">0:00</div></div>
</div>

<div class="btnRow">
  <button class="btn btnReset" id="resetBtn">↺ Reset</button>
  <button class="btn btnStart" id="startBtn">▶ Start</button>
</div>

<div class="statusRow">
  <span class="dot" id="dot"></span>
  <span class="statusTxt" id="statusTxt">Stopped</span>
</div>

<div class="footerNote">💡 Tip: You can even type 7,50 instead of 7.50!</div>

<script>
let mode='s', running=false, rafId=null;
let startTime=null, pausedTotal=0, pausedElapsedMs=0, lastTick=null;

// Mode buttons
document.querySelectorAll('.modeBtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.modeBtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mode=btn.dataset.mode;
    refreshRate();
  });
});

// Buttons
document.getElementById('startBtn').addEventListener('click', ()=>running?doPause():doStart());
document.getElementById('resetBtn').addEventListener('click', doReset);
document.getElementById('wage').addEventListener('input', refreshRate);

// Start/Pause/Reset functions
function doStart(){
  let w=parseFloat(document.getElementById('wage').value.toString().replace(',', '.'));
  if(isNaN(w)||w<=0)return;
  running=true;
  startTime=performance.now();
  lastTick=startTime;
  setUI(true);
  loop();
}

function doPause(){
  running=false;
  cancelAnimationFrame(rafId);
  pausedTotal=currentTotal();
  pausedElapsedMs+=performance.now()-startTime;
  setUI(false);
}

function doReset(){
  running=false;
  cancelAnimationFrame(rafId);
  pausedTotal=0; pausedElapsedMs=0; startTime=null; lastTick=null;
  setUI(false);
  document.getElementById('totalValue').textContent='€0.0000';
  document.getElementById('elapsed').textContent='0:00';
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('statusTxt').textContent='Stopped';
  refreshRate();
}

// Calculate total earned
function currentTotal(){
  let w=parseFloat(document.getElementById('wage').value.toString().replace(',', '.'))||0;
  return pausedTotal + (w/3600) * ((performance.now()-startTime)/1000);
}

// Update UI
function setUI(live){
  const btn=document.getElementById('startBtn');
  btn.textContent=live?'⏸ Pause':'▶ Start';
  live?btn.classList.add('paused'):btn.classList.remove('paused');
  live?document.getElementById('dot').classList.add('live'):document.getElementById('dot').classList.remove('live');
  if(!live&&(pausedTotal>0||pausedElapsedMs>0))document.getElementById('statusTxt').textContent='Paused';
  else if(live)document.getElementById('statusTxt').textContent='Counting live…';
}

// Update rates
function refreshRate(){
  let w=parseFloat(document.getElementById('wage').value.toString().replace(',', '.'))||0;
  const ps=w/3600;
  const cfg={ms:['per millisecond',ps/1000,9], s:['per second',ps,6], m:['per minute',ps*60,4]}[mode];
  document.getElementById('rateLabel').textContent=cfg[0];
  document.getElementById('rateValue').textContent='€'+cfg[1].toFixed(cfg[2]);
  document.getElementById('perMin').textContent='€'+(ps*60).toFixed(4);
  document.getElementById('perHour').textContent='€'+w.toFixed(2);
}

// Main loop
function loop(){
  if(!running) return;
  const now=performance.now();
  const total=currentTotal();
  document.getElementById('totalValue').textContent='€'+total.toFixed(4);
  refreshRate();

  document.getElementById('progressFill').style.width=((now/1000%1)*100)+'%';

  const ms=pausedElapsedMs+(now-startTime);
  const s=Math.floor(ms/1000);
  document.getElementById('elapsed').textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');

  rafId=requestAnimationFrame(loop);
}

refreshRate();
</script>
</body>
</html>
